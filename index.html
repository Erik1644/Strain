<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Strain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── THEME ── */
:root {
  --bg:       #0e0e0f;
  --surface:  #161618;
  --card:     #1c1c1f;
  --border:   rgba(255,255,255,0.07);
  --text:     #f0f0f2;
  --muted:    rgba(240,240,242,0.42);
  --accent:   #2f7fff;
  --accent2:  #1a5acc;
  --danger:   #ff4d4d;
  --success:  #34c77b;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body:    'Barlow', sans-serif;
  --nav-h: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body[data-theme="orange"] {
  --bg:      #100b00;
  --surface: #1a1000;
  --card:    #221500;
  --accent:  #ff7b2c;
  --accent2: #cc5a14;
  --border:  rgba(255,160,60,0.1);
}
body[data-theme="green"] {
  --bg:      #060f08;
  --surface: #0c1a0f;
  --card:    #122016;
  --accent:  #27c76a;
  --accent2: #1a9e50;
  --border:  rgba(40,200,100,0.1);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; overscroll-behavior: none; touch-action: pan-y; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 400;
  display: flex;
  flex-direction: column;
}

/* ── SCROLLABLE VIEWPORT ── */
#viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ── SCREENS ── */
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px);
  transition: opacity .22s ease, transform .22s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
  transform: none;
}

/* ── NAV ── */
nav {
  position: relative;
  z-index: 100;
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
}
nav button {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  transition: color .15s;
  padding: 0;
}
nav button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
nav button.active { color: var(--accent); }

/* ── PROFILE BTN ── */
#profile-btn {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 200;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s;
}
#profile-btn:hover { border-color: var(--accent); }

/* ── PROFILE MENU ── */
#profile-menu {
  display: none;
  position: fixed;
  top: 62px; right: 16px;
  z-index: 201;
  width: 210px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
}
#profile-menu.open { display: block; }
.pmenu-item {
  width: 100%;
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  text-align: left;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: block;
}
.pmenu-item:hover { background: rgba(255,255,255,0.05); }
.pmenu-divider { height: 1px; background: var(--border); margin: 6px 0; }
.pmenu-label { font-size: 11px; color: var(--muted); padding: 4px 12px; text-transform: uppercase; letter-spacing: .08em; }
.theme-row { display: flex; gap: 6px; padding: 6px 10px; }
.theme-dot {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color .15s;
}
.theme-dot.active, .theme-dot:hover { border-color: white; }

/* ── TYPOGRAPHY ── */
.page-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 38px;
  letter-spacing: -.01em;
  line-height: 1;
  margin-bottom: 24px;
  padding-top: 8px;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 28px 0 12px;
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
}
.card-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 20px;
  letter-spacing: .02em;
  margin-bottom: 6px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  border: none; border-radius: 10px; cursor: pointer;
  font-family: var(--font-display);
  font-weight: 700; font-size: 15px;
  letter-spacing: .05em; text-transform: uppercase;
  padding: 11px 18px;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .88; }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); }
.btn-danger { background: rgba(255,77,77,0.15); color: var(--danger); }
.btn-sm { font-size: 12px; padding: 7px 12px; border-radius: 7px; }
.btn-full { width: 100%; margin-top: 10px; }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  border-radius: 8px; font-size: 16px;
}

/* ── DAY CARDS ── */
.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
  transition: border-color .2s;
}
.day-card:hover { border-color: rgba(255,255,255,0.14); }
.day-card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 10px;
}
.day-card-name {
  font-family: var(--font-display);
  font-weight: 800; font-size: 22px; letter-spacing: .02em;
  line-height: 1.1;
}
.day-card-excount {
  font-size: 12px; color: var(--muted); margin-top: 2px;
}
.ex-pill {
  display: inline-block;
  background: rgba(255,255,255,0.07);
  border-radius: 6px;
  font-size: 12px;
  padding: 3px 8px;
  margin: 2px 3px 2px 0;
  color: var(--muted);
}
.day-menu-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 20px; line-height: 1;
  padding: 0 2px; border-radius: 6px;
  transition: color .15s;
}
.day-menu-btn:hover { color: var(--text); }
.day-dropdown {
  position: absolute;
  top: 44px; right: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px;
  z-index: 50;
  min-width: 130px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
.day-dropdown button {
  display: block; width: 100%; text-align: left;
  padding: 9px 12px;
  background: none; border: none; cursor: pointer;
  color: var(--text); font-size: 13px; border-radius: 7px;
}
.day-dropdown button:hover { background: rgba(255,255,255,.06); }
.day-dropdown .del-btn { color: var(--danger); }

/* ── WIDGET GRID ── */
.widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
@media (max-width: 480px) { .widgets { grid-template-columns: 1fr; } }
.widget {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
}
.widget-title {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.best-lift-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.best-lift-row:last-child { border-bottom: none; }
.best-lift-name { color: var(--muted); }
.best-lift-val { font-family: var(--font-display); font-weight: 700; font-size: 16px; }

/* ── WORKOUT SCREEN ── */
.workout-header {
  display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px;
}
.workout-day-label {
  font-size: 12px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em;
}
.workout-day-name {
  font-family: var(--font-display);
  font-size: 34px; font-weight: 900;
}
.ex-log-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .2s;
}
.ex-log-card.current { border-color: var(--accent); }
.ex-log-card.done { opacity: .45; }
.ex-log-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 14px 10px;
}
.ex-log-name {
  font-family: var(--font-display);
  font-size: 19px; font-weight: 700;
}
.ex-status-badge {
  font-size: 11px;
  padding: 3px 8px; border-radius: 20px;
  font-family: var(--font-display);
  font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
}
.badge-current { background: rgba(47,127,255,.18); color: var(--accent); }
.badge-done    { background: rgba(52,199,123,.15); color: var(--success); }
.set-log { padding: 0 14px; }
.set-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  font-size: 13px; color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.set-row:last-child { border-bottom: none; }
.set-val { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); }
.ex-input-area { padding: 12px 14px 14px; border-top: 1px solid var(--border); }
.hint-text { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: .02em; }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.input-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  outline: none;
  transition: border-color .15s;
}
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--muted); font-size: 13px; }
.action-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── QUICK ADD ── */
#quick-add-btn {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
  right: 18px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 26px;
  border: none; cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(47,127,255,.45);
  z-index: 90;
  transition: transform .15s, opacity .15s;
}
#quick-add-btn:hover { transform: scale(1.08); }
#quick-add-btn.visible { display: flex; }

/* ── PROGRESS SCREEN ── */
.chart-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  height: 180px;
  margin-bottom: 16px;
}
.history-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}
.history-card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 8px;
}
.history-day-name {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 800;
}
.history-date {
  font-size: 11px; color: var(--muted);
}
.history-vol {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 900;
  color: var(--accent);
}
.history-vol span { font-size: 12px; font-weight: 400; color: var(--muted); }
.history-exes { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ── ADD DAY BTN ── */
.add-day-btn {
  width: 100%;
  background: var(--surface);
  border: 1px dashed rgba(255,255,255,0.15);
  color: var(--muted);
  border-radius: 14px;
  padding: 16px;
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.add-day-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── EDITOR ── */
.editor-card {
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}
.editor-name-row {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.editor-name-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 12px;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  outline: none;
}
.editor-name-row input:focus { border-color: var(--accent); }
.ex-edit-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.ex-edit-row:last-child { border-bottom: none; }
.ex-remove-btn {
  background: none; border: none; cursor: pointer;
  color: var(--danger); font-size: 18px; line-height: 1;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
}
.ex-remove-btn:hover { background: rgba(255,77,77,.1); }
.add-ex-row {
  display: flex; gap: 8px; margin-top: 12px;
}
.add-ex-row input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px; outline: none;
}
.add-ex-row input:focus { border-color: var(--accent); }
.editor-actions { display: flex; gap: 8px; margin-top: 14px; }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.fade-up { animation: fadeUp .25s ease forwards; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
</style>
</head>
<body data-theme="dark">

<button id="profile-btn" aria-label="Profile">👤</button>

<div id="profile-menu">
  <div class="pmenu-label">Theme</div>
  <div class="theme-row">
    <div class="theme-dot active" data-theme="dark" style="background:#2f7fff" title="Dark Blue"></div>
    <div class="theme-dot" data-theme="orange" style="background:#ff7b2c" title="Orange"></div>
    <div class="theme-dot" data-theme="green" style="background:#27c76a" title="Green"></div>
  </div>
  <div class="pmenu-divider"></div>
  <button class="pmenu-item" id="backup-btn">📤 Export Backup</button>
  <button class="pmenu-item" id="link-btn">🔗 Link Profile</button>
  <div class="pmenu-divider"></div>
  <button class="pmenu-item" id="reset-btn" style="color:var(--danger)">🗑 Reset All Data</button>
</div>

<div id="viewport">
  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="page-title">Your Strain</div>

    <div class="section-title">Training Days</div>
    <div id="days-list"></div>
    <button class="add-day-btn" id="add-day-btn">＋ Add Training Day</button>

    <div class="section-title">Overview</div>
    <div class="widgets">
      <div class="widget">
        <div class="widget-title">🏆 Best Lifts</div>
        <div id="best-lifts-widget"></div>
      </div>
      <div class="widget">
        <div class="widget-title">📅 Last Session</div>
        <div id="recent-widget"></div>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div id="screen-log" class="screen">
    <div id="log-content"></div>
  </div>

  <!-- PROGRESS -->
  <div id="screen-progress" class="screen">
    <div class="page-title">Progress</div>
    <div class="chart-wrap">
      <canvas id="volumeChart"></canvas>
    </div>
    <div class="section-title">History</div>
    <div id="history-list"></div>
  </div>
</div>

<button id="quick-add-btn" title="Quick-add exercise">＋</button>

<nav>
  <button id="nav-home" class="active">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button id="nav-log">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Log
  </button>
  <button id="nav-progress">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

<script>
/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const STORAGE_KEY = 'strain-v3';

let state = {
  theme: 'dark',
  days: [],
  history: [],
  bestLifts: [],       // [{id, exercise, weight, reps}]
  currentWorkout: null // null | workout object
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch(e) {}
  if (!state.days.length) seedDefaultDay();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function seedDefaultDay() {
  state.days = [{
    id: uid(), name: 'Push Day',
    exercises: [
      { id: uid(), name: 'Bench Press' },
      { id: uid(), name: 'Overhead Press' },
      { id: uid(), name: 'Tricep Dips' }
    ]
  }];
}

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
}

/* ─────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────── */
const screens = {
  home:     document.getElementById('screen-home'),
  log:      document.getElementById('screen-log'),
  progress: document.getElementById('screen-progress'),
};
const navBtns = {
  home:     document.getElementById('nav-home'),
  log:      document.getElementById('nav-log'),
  progress: document.getElementById('nav-progress'),
};

let currentScreen = 'home';

function switchTo(name) {
  screens[currentScreen].classList.remove('active');
  navBtns[currentScreen].classList.remove('active');
  currentScreen = name;
  screens[name].classList.add('active');
  navBtns[name].classList.add('active');
  if (name === 'progress') renderProgress();
  if (name === 'log') renderLog();
  if (name === 'home') renderHome();
}

Object.keys(navBtns).forEach(k => navBtns[k].addEventListener('click', () => switchTo(k)));

/* ─────────────────────────────────────────
   THEME
───────────────────────────────────────── */
function applyTheme(t) {
  state.theme = t;
  document.body.dataset.theme = t;
  document.querySelectorAll('.theme-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.theme === t);
  });
  saveState();
}

document.querySelectorAll('.theme-dot').forEach(d =>
  d.addEventListener('click', () => { applyTheme(d.dataset.theme); closeProfileMenu(); })
);

/* ─────────────────────────────────────────
   PROFILE MENU
───────────────────────────────────────── */
const profileMenu = document.getElementById('profile-menu');

function openProfileMenu() { profileMenu.classList.add('open'); }
function closeProfileMenu() { profileMenu.classList.remove('open'); }

document.getElementById('profile-btn').addEventListener('click', e => {
  e.stopPropagation();
  profileMenu.classList.contains('open') ? closeProfileMenu() : openProfileMenu();
});

document.addEventListener('click', () => closeProfileMenu());
profileMenu.addEventListener('click', e => e.stopPropagation());

document.getElementById('backup-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `strain-backup-${Date.now()}.json`
  });
  a.click(); URL.revokeObjectURL(a.href);
  closeProfileMenu();
});

document.getElementById('link-btn').addEventListener('click', () => {
  const name = prompt('Enter profile name:');
  if (name) { state.profile = name.trim(); saveState(); alert('Saved locally.'); }
  closeProfileMenu();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset ALL data? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});

/* ─────────────────────────────────────────
   HOME
───────────────────────────────────────── */
let openDropdown = null;

function renderHome() {
  renderDays();
  renderBestLiftsWidget();
  renderRecentWidget();
}

function renderDays() {
  const el = document.getElementById('days-list');
  el.innerHTML = '';

  if (!state.days.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🗓</div>No training days yet.</div>';
    return;
  }

  state.days.forEach(day => {
    const card = document.createElement('div');
    card.className = 'day-card fade-up';

    const header = document.createElement('div');
    header.className = 'day-card-header';

    const nameCol = document.createElement('div');
    nameCol.innerHTML = `
      <div class="day-card-name">${esc(day.name)}</div>
      <div class="day-card-excount">${day.exercises.length} exercise${day.exercises.length !== 1 ? 's' : ''}</div>
    `;

    const menuBtn = document.createElement('button');
    menuBtn.className = 'day-menu-btn';
    menuBtn.innerHTML = '•••';
    menuBtn.addEventListener('click', e => { e.stopPropagation(); toggleDayMenu(day, card, menuBtn); });

    header.appendChild(nameCol);
    header.appendChild(menuBtn);
    card.appendChild(header);

    const pills = document.createElement('div');
    day.exercises.slice(0, 5).forEach(ex => {
      const p = document.createElement('span');
      p.className = 'ex-pill'; p.textContent = ex.name;
      pills.appendChild(p);
    });
    if (day.exercises.length > 5) {
      const p = document.createElement('span');
      p.className = 'ex-pill'; p.textContent = `+${day.exercises.length - 5} more`;
      pills.appendChild(p);
    }
    card.appendChild(pills);

    const startBtn = document.createElement('button');
    startBtn.className = 'btn btn-primary btn-full';
    startBtn.textContent = 'Start Workout';
    startBtn.addEventListener('click', () => startWorkout(day.id));
    card.appendChild(startBtn);

    el.appendChild(card);
  });
}

function toggleDayMenu(day, card, btn) {
  // Remove any existing
  if (openDropdown) { openDropdown.remove(); openDropdown = null; }
  const dd = document.createElement('div');
  dd.className = 'day-dropdown';
  dd.innerHTML = `
    <button class="edit-day-btn">✏️ Edit Day</button>
    <button class="del-btn">🗑 Delete Day</button>
  `;
  dd.querySelector('.edit-day-btn').addEventListener('click', () => { dd.remove(); openDropdown = null; openEditor(day); });
  dd.querySelector('.del-btn').addEventListener('click', () => { dd.remove(); openDropdown = null; deleteDay(day.id); });
  card.appendChild(dd);
  openDropdown = dd;
  document.addEventListener('click', function handler() { dd.remove(); openDropdown = null; document.removeEventListener('click', handler); }, { once: true });
}

document.getElementById('add-day-btn').addEventListener('click', () => {
  const name = prompt('Training day name:');
  if (!name) return;
  state.days.push({ id: uid(), name: name.trim(), exercises: [] });
  saveState(); renderDays();
});

function deleteDay(id) {
  if (!confirm('Delete this day?')) return;
  state.days = state.days.filter(d => d.id !== id);
  saveState(); renderDays();
}

/* ── Day Editor ── */
function openEditor(day) {
  const el = document.getElementById('days-list');
  el.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'editor-card fade-up';

  const nameRow = document.createElement('div');
  nameRow.className = 'editor-name-row';
  const nameInput = document.createElement('input');
  nameInput.value = day.name;
  nameInput.placeholder = 'Day name';
  nameRow.appendChild(nameInput);
  card.appendChild(nameRow);

  const exList = document.createElement('div');
  card.appendChild(exList);

  function refreshExList() {
    exList.innerHTML = '';
    if (!day.exercises.length) {
      exList.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No exercises yet.</div>';
      return;
    }
    day.exercises.forEach((ex, i) => {
      const row = document.createElement('div');
      row.className = 'ex-edit-row';
      row.innerHTML = `<span>${esc(ex.name)}</span>`;
      const rm = document.createElement('button');
      rm.className = 'ex-remove-btn'; rm.innerHTML = '−';
      rm.addEventListener('click', () => { day.exercises.splice(i, 1); saveState(); refreshExList(); });
      row.appendChild(rm);
      exList.appendChild(row);
    });
  }
  refreshExList();

  const addRow = document.createElement('div');
  addRow.className = 'add-ex-row';
  const addInput = document.createElement('input');
  addInput.placeholder = 'Exercise name…';
  addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-ghost btn-sm'; addBtn.textContent = 'Add';
  addBtn.addEventListener('click', () => {
    const n = addInput.value.trim();
    if (!n) return;
    day.exercises.push({ id: uid(), name: n });
    addInput.value = ''; saveState(); refreshExList();
  });
  addRow.appendChild(addInput); addRow.appendChild(addBtn);
  card.appendChild(addRow);

  const actions = document.createElement('div');
  actions.className = 'editor-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary'; saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => {
    day.name = nameInput.value.trim() || day.name;
    saveState(); renderDays();
  });
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost'; cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => renderDays());
  actions.appendChild(saveBtn); actions.appendChild(cancelBtn);
  card.appendChild(actions);

  el.appendChild(card);
}

/* ── Best Lifts Widget ── */
function renderBestLiftsWidget() {
  const el = document.getElementById('best-lifts-widget');
  el.innerHTML = '';

  if (!state.bestLifts.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">Track your top lifts after completing workouts.</div>';
    return;
  }
  state.bestLifts.forEach(l => {
    const row = document.createElement('div');
    row.className = 'best-lift-row';
    row.innerHTML = `
      <span class="best-lift-name">${esc(l.exercise)}</span>
      <span class="best-lift-val">${l.weight}kg<span style="font-size:11px;font-weight:400;color:var(--muted)"> ×${l.reps}</span></span>
    `;
    el.appendChild(row);
  });
}

/* ── Recent Widget ── */
function renderRecentWidget() {
  const el = document.getElementById('recent-widget');
  if (!state.history.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">No sessions logged yet.</div>';
    return;
  }
  const w = state.history[0];
  el.innerHTML = `
    <div style="font-family:var(--font-display);font-size:18px;font-weight:800;">${esc(w.dayName)}</div>
    <div style="font-size:11px;color:var(--muted);margin:2px 0 6px;">${w.date}</div>
    <div style="font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--accent);">${w.volume}<span style="font-size:12px;font-weight:400;color:var(--muted);"> kg vol</span></div>
  `;
}

/* ─────────────────────────────────────────
   WORKOUT / LOG
───────────────────────────────────────── */
function startWorkout(dayId) {
  const day = state.days.find(d => d.id === dayId);
  if (!day) return;
  if (!day.exercises.length) { alert('Add exercises to this day first.'); return; }

  state.currentWorkout = {
    id: uid(),
    date: new Date().toISOString().slice(0, 10),
    dayId: day.id,
    dayName: day.name,
    currentIdx: 0,
    exercises: day.exercises.map(ex => ({ name: ex.name, sets: [] }))
  };
  saveState();
  switchTo('log');
}

function renderLog() {
  const el = document.getElementById('log-content');
  el.innerHTML = '';
  const qa = document.getElementById('quick-add-btn');

  const wk = state.currentWorkout;
  if (!wk) {
    qa.classList.remove('visible');
    el.innerHTML = `
      <div class="page-title">Log</div>
      <div class="empty">
        <div class="empty-icon">🏋️</div>
        No active workout.<br>Start one from Home.
      </div>
    `;
    return;
  }

  qa.classList.add('visible');

  const header = document.createElement('div');
  header.className = 'workout-header';
  header.innerHTML = `
    <div class="workout-day-label">Active Workout · ${wk.date}</div>
    <div class="workout-day-name">${esc(wk.dayName)}</div>
  `;
  el.appendChild(header);

  wk.exercises.forEach((ex, idx) => {
    const isCurrent = idx === wk.currentIdx;
    const isDone    = idx < wk.currentIdx;

    const card = document.createElement('div');
    card.className = 'ex-log-card' + (isCurrent ? ' current' : isDone ? ' done' : '');

    const hdr = document.createElement('div');
    hdr.className = 'ex-log-header';
    const badge = isCurrent ? '<span class="ex-status-badge badge-current">Current</span>'
                : isDone    ? '<span class="ex-status-badge badge-done">✓ Done</span>'
                :             '';
    hdr.innerHTML = `<span class="ex-log-name">${esc(ex.name)}</span>${badge}`;
    card.appendChild(hdr);

    if (ex.sets.length) {
      const setLog = document.createElement('div');
      setLog.className = 'set-log';
      ex.sets.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'set-row';
        row.innerHTML = `<span>Set ${i+1}</span><span class="set-val">${s.weight} kg × ${s.reps}</span>`;
        setLog.appendChild(row);
      });
      card.appendChild(setLog);
    }

    if (isCurrent) {
      card.appendChild(buildInputArea(wk, ex, idx));
    }

    el.appendChild(card);
  });
}

function buildInputArea(wk, ex, idx) {
  const area = document.createElement('div');
  area.className = 'ex-input-area';

  // Previous hint
  const prev = findPrev(ex.name);
  const nextSet = ex.sets.length + 1;
  let defW = '', defR = '';
  if (prev && prev.sets[nextSet - 1]) {
    defW = prev.sets[nextSet - 1].weight;
    defR = prev.sets[nextSet - 1].reps;
  }
  if (prev) {
    const hint = document.createElement('div');
    hint.className = 'hint-text';
    hint.textContent = `Last time — Set ${nextSet}: ${defW||'?'}kg × ${defR||'?'}`;
    area.appendChild(hint);
  }

  const inputRow = document.createElement('div');
  inputRow.className = 'input-row';
  const wInput = document.createElement('input');
  wInput.type = 'number'; wInput.placeholder = 'kg'; wInput.value = defW;
  const rInput = document.createElement('input');
  rInput.type = 'number'; rInput.placeholder = 'reps'; rInput.value = defR;
  inputRow.appendChild(wInput); inputRow.appendChild(rInput);
  area.appendChild(inputRow);

  const actions = document.createElement('div');
  actions.className = 'action-row';

  const logBtn = document.createElement('button');
  logBtn.className = 'btn btn-primary btn-sm';
  logBtn.textContent = `Log Set ${nextSet}`;
  logBtn.addEventListener('click', () => {
    const w = parseFloat(wInput.value);
    const r = parseInt(rInput.value, 10);
    if (!w || w <= 0 || !r || r <= 0) { alert('Enter valid weight and reps.'); return; }
    ex.sets.push({ weight: w, reps: r });
    updateBestLift(ex.name, w, r);
    saveState(); renderLog();
  });

  const undoBtn = document.createElement('button');
  undoBtn.className = 'btn btn-ghost btn-sm';
  undoBtn.textContent = 'Undo';
  undoBtn.addEventListener('click', () => {
    if (!ex.sets.length) return;
    ex.sets.pop(); saveState(); renderLog();
  });

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-ghost btn-sm';
  const isLast = idx === wk.exercises.length - 1;
  nextBtn.textContent = isLast ? 'Finish 🏁' : 'Next Exercise →';
  nextBtn.addEventListener('click', () => {
    if (!isLast) { wk.currentIdx++; saveState(); renderLog(); }
    else finishWorkout();
  });

  actions.appendChild(logBtn);
  actions.appendChild(undoBtn);
  actions.appendChild(nextBtn);
  area.appendChild(actions);
  return area;
}

function findPrev(exName) {
  for (const w of state.history) {
    const e = w.exercises.find(e => e.name === exName);
    if (e) return e;
  }
  return null;
}

function updateBestLift(name, weight, reps) {
  const lift = state.bestLifts.find(l => l.exercise === name);
  if (!lift) return;
  if (weight > lift.weight || (weight === lift.weight && reps > lift.reps)) {
    lift.weight = weight; lift.reps = reps;
  }
}

function finishWorkout() {
  const wk = state.currentWorkout;
  if (!wk) return;

  const volume = wk.exercises.reduce((t, ex) =>
    t + ex.sets.reduce((s, set) => s + set.weight * set.reps, 0), 0
  );

  state.history.unshift({
    id: wk.id, date: wk.date,
    dayId: wk.dayId, dayName: wk.dayName,
    volume,
    exercises: wk.exercises.map(ex => ({ name: ex.name, sets: [...ex.sets] }))
  });

  state.currentWorkout = null;
  saveState();
  document.getElementById('quick-add-btn').classList.remove('visible');
  renderHome();
  switchTo('home');
}

// Quick add
document.getElementById('quick-add-btn').addEventListener('click', () => {
  const wk = state.currentWorkout;
  if (!wk) return;
  const name = prompt('Exercise name:');
  if (!name) return;
  wk.exercises.push({ name: name.trim(), sets: [] });
  saveState(); renderLog();
});

/* ─────────────────────────────────────────
   PROGRESS
───────────────────────────────────────── */
let chartInst = null;

function renderProgress() {
  const histEl = document.getElementById('history-list');
  histEl.innerHTML = '';

  const canvas = document.getElementById('volumeChart');

  if (!state.history.length) {
    histEl.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>No history yet. Complete a workout!</div>';
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    return;
  }

  state.history.forEach(w => {
    const card = document.createElement('div');
    card.className = 'history-card fade-up';
    card.innerHTML = `
      <div class="history-card-top">
        <div>
          <div class="history-day-name">${esc(w.dayName)}</div>
          <div class="history-exes">${w.exercises.map(e => esc(e.name)).join(' · ')}</div>
        </div>
        <div style="text-align:right;">
          <div class="history-vol">${w.volume}<span> kg</span></div>
          <div class="history-date">${w.date}</div>
        </div>
      </div>
    `;
    histEl.appendChild(card);
  });

  // Chart
  const sorted = [...state.history].sort((a, b) => new Date(a.date) - new Date(b.date));
  const labels = sorted.map(w => w.date);
  const data   = sorted.map(w => w.volume);

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#2f7fff',
        backgroundColor: 'rgba(47,127,255,0.12)',
        fill: true, tension: 0.35, pointRadius: 4,
        pointBackgroundColor: '#fff',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#777', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { beginAtZero: true, ticks: { color: '#777', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      },
      animation: { duration: 600 }
    }
  });
}

/* ─────────────────────────────────────────
   UTILS
───────────────────────────────────────── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
loadState();
applyTheme(state.theme || 'dark');
renderHome();
</script>
</body>
</html>
