<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Strain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg:#0a0a0b; --surface:#131315; --card:#1a1a1e; --card2:#202026;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#ededf0; --muted:rgba(237,237,240,0.4);
  --accent:#2f7fff; --accent-bg:rgba(47,127,255,0.12);
  --danger:#ff4d4d; --success:#34c77b; --warn:#f5a623;
  --font-d:'Barlow Condensed',sans-serif; --font-b:'Barlow',sans-serif;
  --nav-h:66px; --safe:env(safe-area-inset-bottom,0px); --r:16px;
}
body[data-theme="orange"] {
  --bg:#0f0800; --surface:#180e00; --card:#201200; --card2:#281800;
  --accent:#ff7b2c; --accent-bg:rgba(255,123,44,0.12);
  --border:rgba(255,140,50,0.09); --border2:rgba(255,140,50,0.16);
}
body[data-theme="green"] {
  --bg:#050e07; --surface:#091409; --card:#0e1c10; --card2:#132516;
  --accent:#2ecc6e; --accent-bg:rgba(46,204,110,0.12);
  --border:rgba(46,204,110,0.09); --border2:rgba(46,204,110,0.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;width:100%;overflow:hidden}
body{
  height:100%;width:100%;max-width:100vw;overflow:hidden;overscroll-behavior:none;
  background:var(--bg);color:var(--text);font-family:var(--font-b);font-weight:400;
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;
}
input,textarea{-webkit-user-select:text;user-select:text}
#viewport{flex:1;overflow:hidden;position:relative;max-width:100vw}
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;max-width:100vw;
  overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe) + 16px);
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .2s ease,transform .2s ease;
}
.screen.active{opacity:1;pointer-events:all;transform:none}

/* NAV */
nav{
  z-index:100;display:flex;background:var(--surface);
  border-top:1px solid var(--border);
  height:calc(var(--nav-h) + var(--safe));padding-bottom:var(--safe);
  max-width:100vw;overflow:hidden;
}
nav button{
  flex:1;background:none;border:none;color:var(--muted);
  font-family:var(--font-d);font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:color .15s;padding:0;
}
nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
nav button.active{color:var(--accent)}

/* SETTINGS */
#settings-btn{
  position:fixed;top:18px;right:16px;z-index:200;
  width:36px;height:36px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,border-color .15s;
}
#settings-menu{
  display:none;position:fixed;top:62px;right:16px;z-index:201;
  width:220px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:8px;box-shadow:0 16px 48px rgba(0,0,0,.7);
}
#settings-menu.open{display:block}
.smenu-label{font-size:10px;color:var(--muted);padding:6px 10px 4px;text-transform:uppercase;letter-spacing:.1em}
.smenu-item{
  width:100%;background:none;border:none;color:var(--text);
  font-family:var(--font-b);font-size:14px;text-align:left;
  padding:10px 12px;border-radius:9px;cursor:pointer;display:block;transition:background .1s;
}
.smenu-item:hover{background:rgba(255,255,255,0.05)}
.smenu-divider{height:1px;background:var(--border);margin:6px 0}
.theme-dots{display:flex;gap:8px;padding:6px 12px 10px}
.tdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s}
.tdot:hover,.tdot.on{border-color:#fff;transform:scale(1.1)}

/* HERO */
.hero-card{
  margin:16px 16px 0;
  background:linear-gradient(135deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 55%,#000) 100%);
  border-radius:20px;padding:20px;position:relative;overflow:hidden;
}
.hero-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(255,255,255,0.13) 0%,transparent 60%)}
.hero-eyebrow{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-bottom:4px}
.hero-title{font-family:var(--font-d);font-size:26px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:3px}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.65)}
.hero-stats{display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.18)}
.hero-stat-val{font-family:var(--font-d);font-size:22px;font-weight:900;color:#fff}
.hero-stat-lbl{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px}

/* SECTION HEADERS */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 10px}
.sec-lbl{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.sec-action{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:none;border:none;cursor:pointer}

/* PROGRAM CARD */
.prog-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin:0 16px 10px;
  position:relative;max-width:calc(100% - 32px);word-break:break-word;transition:border-color .2s;
}
.prog-card.active-prog{border-color:var(--accent)}
.prog-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.prog-name{font-family:var(--font-d);font-weight:800;font-size:22px;letter-spacing:.02em;line-height:1.1}
.prog-meta{font-size:12px;color:var(--muted);margin-top:3px}
.prog-bar{height:4px;background:var(--border2);border-radius:2px;margin:12px 0 10px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.week-pills{display:flex;gap:6px;flex-wrap:wrap}
.wpill{
  font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.04em;
  padding:4px 10px;border-radius:6px;border:1px solid var(--border2);
  background:none;color:var(--muted);
}
.wpill.done{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.wpill.cur{background:var(--accent);color:#fff;border-color:var(--accent)}

/* DAY CARD */
.day-card{
  background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:8px;position:relative;max-width:100%;word-break:break-word;
}
.day-card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.day-name{font-family:var(--font-d);font-weight:800;font-size:19px;line-height:1.1}
.day-excount{font-size:11px;color:var(--muted);margin-top:2px}
.ex-pill{
  display:inline-block;background:rgba(255,255,255,0.06);border-radius:5px;
  font-size:11px;padding:2px 7px;margin:2px 3px 2px 0;color:var(--muted);
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* MENU BUTTONS & DROPDOWNS */
.menu-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px 4px;border-radius:6px;transition:color .15s}
.menu-btn:hover{color:var(--text)}
.dropdown{
  position:absolute;top:40px;right:10px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:5px;z-index:50;min-width:150px;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
}
.dropdown button{display:block;width:100%;text-align:left;padding:9px 12px;background:none;border:none;cursor:pointer;color:var(--text);font-size:13px;border-radius:7px;transition:background .1s}
.dropdown button:hover{background:rgba(255,255,255,.06)}
.dropdown .danger{color:var(--danger)}

/* DASHED ADD */
.add-btn{
  width:100%;background:none;border:1px dashed rgba(255,255,255,0.13);
  color:var(--muted);border-radius:12px;padding:14px;
  font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:border-color .2s,color .2s;
}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  border:none;border-radius:10px;cursor:pointer;
  font-family:var(--font-d);font-weight:700;font-size:15px;
  letter-spacing:.05em;text-transform:uppercase;padding:11px 18px;
  transition:opacity .15s,transform .1s;white-space:nowrap;
}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:rgba(255,255,255,0.07);color:var(--text)}
.btn-danger{background:rgba(255,77,77,0.13);color:var(--danger)}
.btn-sm{font-size:12px;padding:8px 14px;border-radius:8px}
.btn-full{width:100%;margin-top:10px}

/* WORKOUT */
.wk-hd{padding:20px 16px 12px}
.wk-eyebrow{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.wk-title{font-family:var(--font-d);font-size:32px;font-weight:900;line-height:1}
.wk-segs{display:flex;gap:4px;margin:12px 16px 0}
.wk-seg{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.wk-seg.done{background:var(--success)}
.wk-seg.active{background:var(--accent)}

.ex-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;margin:10px 16px 0;overflow:hidden;transition:border-color .2s;
}
.ex-card.current{border-color:var(--accent)}
.ex-card.done-ex{opacity:.4}
.ex-card-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 10px}
.ex-card-name{font-family:var(--font-d);font-size:20px;font-weight:700}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-family:var(--font-d);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-on{background:var(--accent-bg);color:var(--accent)}
.badge-done{background:rgba(52,199,123,.15);color:var(--success)}
.set-list{padding:0 14px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-val{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--text)}
.ex-input{padding:12px 14px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,0.02)}
.hint{font-size:11px;color:var(--muted);margin-bottom:8px}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:11px 12px;color:var(--text);
  font-family:var(--font-b);font-size:16px;outline:none;
  transition:border-color .15s;-webkit-appearance:none;
}
.input-row input:focus{border-color:var(--accent)}
.input-row input::placeholder{color:var(--muted);font-size:14px}
.act-row{display:flex;gap:8px;flex-wrap:wrap;max-width:100%}



/* QUICK ADD */
#quick-add-btn{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe) + 16px);right:16px;
  width:48px;height:48px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:24px;
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(47,127,255,.4);z-index:79;
}
#quick-add-btn.visible{display:flex}

/* PROGRESS */
.screen-header{padding:20px 16px 16px;display:flex;align-items:flex-end;justify-content:space-between}
.screen-title{font-family:var(--font-d);font-weight:900;font-size:34px;letter-spacing:-.01em;line-height:1}
.screen-sub{font-size:13px;color:var(--muted);margin-top:3px}
.prog-tabs{display:flex;gap:0;margin:0 16px 14px;background:var(--surface);border-radius:10px;padding:3px}
.prog-tab{
  flex:1;background:none;border:none;cursor:pointer;
  font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);padding:8px 6px;border-radius:8px;transition:all .15s;
}
.prog-tab.active{background:var(--card2);color:var(--text)}
.chart-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin:0 16px 12px;height:200px;
}
.chart-empty{height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);text-align:center;padding:20px}
.ex-chips{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.ex-chips::-webkit-scrollbar{display:none}
.ex-chip{
  flex-shrink:0;font-family:var(--font-d);font-size:12px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  padding:6px 12px;border-radius:20px;border:1px solid var(--border2);
  background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;
}
.ex-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin:0 16px 10px}
.hist-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.hist-name{font-family:var(--font-d);font-size:18px;font-weight:800}
.hist-date{font-size:11px;color:var(--muted)}
.hist-vol{font-family:var(--font-d);font-size:24px;font-weight:900;color:var(--accent)}
.hist-vol span{font-size:12px;font-weight:400;color:var(--muted)}
.hist-exes{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}

/* EDITOR */
.editor-wrap{padding:0 16px}
.editor-card{background:var(--card);border:1px solid var(--accent);border-radius:var(--r);padding:16px;margin-bottom:10px}
.field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.field-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:10px 12px;color:var(--text);
  font-family:var(--font-b);font-size:16px;outline:none;
  transition:border-color .15s;-webkit-appearance:none;
}
.field-input:focus{border-color:var(--accent)}
.field-row{margin-bottom:12px}
.ed-ex-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.ed-ex-row:last-child{border-bottom:none}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--danger);font-size:20px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.add-ex-row{display:flex;gap:8px;margin-top:10px}
.add-ex-row input{flex:1}
.ed-actions{display:flex;gap:8px;margin-top:14px}

/* UP/DOWN REORDER ARROWS */
.reorder-btns{display:flex;flex-direction:column;gap:2px;margin-right:8px;flex-shrink:0}
.reorder-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:1px 4px;border-radius:4px;transition:color .1s}
.reorder-btn:hover{color:var(--accent)}
.reorder-btn:disabled{opacity:.2;cursor:default}

/* SUMMARY SCREEN */
#screen-summary{
  position:fixed;inset:0;z-index:300;
  background:var(--bg);overflow-y:auto;overflow-x:hidden;
  display:none;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:60px 24px 40px;
}
#screen-summary.visible{display:flex}
.summary-icon{font-size:56px;margin-bottom:16px}
.summary-title{font-family:var(--font-d);font-size:42px;font-weight:900;text-align:center;margin-bottom:4px}
.summary-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:340px;margin-bottom:24px}
.summary-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.summary-stat-val{font-family:var(--font-d);font-size:28px;font-weight:900;color:var(--accent)}
.summary-stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
.summary-prs{width:100%;max-width:340px;margin-bottom:28px}
.summary-pr{
  display:flex;align-items:center;gap:10px;
  background:rgba(52,199,123,0.1);border:1px solid rgba(52,199,123,0.2);
  border-radius:10px;padding:10px 14px;margin-bottom:8px;
}
.summary-pr-icon{font-size:18px}
.summary-pr-text{font-size:13px}
.summary-pr-name{font-weight:600;color:var(--success)}

/* HISTORY DELETE */
.hist-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px 6px;border-radius:6px;transition:color .1s,background .1s;flex-shrink:0}
.hist-del:hover{color:var(--danger);background:rgba(255,77,77,.1)}

/* COLOR PICKER */
.color-picker-row{display:flex;align-items:center;gap:10px;padding:6px 12px 10px}
#custom-color{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);
  padding:0;cursor:pointer;background:none;overflow:hidden;
  -webkit-appearance:none;appearance:none;
}
#custom-color::-webkit-color-swatch-wrapper{padding:0}
#custom-color::-webkit-color-swatch{border:none;border-radius:50%}
.color-apply-btn{
  font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:var(--accent);color:#fff;border:none;border-radius:7px;
  padding:6px 12px;cursor:pointer;
}
.empty-icon{font-size:36px;margin-bottom:10px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .22s ease forwards}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
</style>
</head>
<body data-theme="dark">

<button id="settings-btn" aria-label="Settings">⚙️</button>
<div id="settings-menu">
  <div class="smenu-label">Theme</div>
  <div class="theme-dots">
    <div class="tdot on" data-theme="dark"   style="background:#2f7fff"></div>
    <div class="tdot"    data-theme="orange" style="background:#ff7b2c"></div>
    <div class="tdot"    data-theme="green"  style="background:#2ecc6e"></div>
  </div>
  <div class="smenu-label">Custom Accent</div>
  <div class="color-picker-row">
    <input type="color" id="custom-color" value="#2f7fff">
    <button class="color-apply-btn" id="apply-color-btn">Apply</button>
    <span style="font-size:11px;color:var(--muted)">Pick any color</span>
  </div>
  <div class="smenu-divider"></div>
  <button class="smenu-item" id="export-btn">📤 Export Backup</button>
  <div class="smenu-divider"></div>
  <button class="smenu-item" id="reset-btn" style="color:var(--danger)">🗑 Reset All Data</button>
</div>

<div id="viewport">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div id="home-hero"></div>
    <div class="sec-hd">
      <span class="sec-lbl">Programs</span>
      <button class="sec-action" id="new-prog-btn">＋ New</button>
    </div>
    <div id="prog-list"></div>
    <div id="active-days-section" style="display:none">
      <div class="sec-hd">
        <span class="sec-lbl" id="active-days-lbl">This Week</span>
      </div>
      <div id="active-days-list" style="padding:0 16px"></div>
    </div>
  </div>

  <!-- WORKOUT -->
  <div id="screen-workout" class="screen">
    <div id="workout-content"></div>
  </div>

  <!-- PROGRESS -->
  <div id="screen-progress" class="screen">
    <div class="screen-header">
      <div>
        <div class="screen-title">Progress</div>
        <div class="screen-sub" id="progress-sub"></div>
      </div>
    </div>
    <div class="prog-tabs">
      <button class="prog-tab active" data-tab="volume">Volume</button>
      <button class="prog-tab" data-tab="exercise">Exercise</button>
      <button class="prog-tab" data-tab="history">History</button>
    </div>
    <div id="tab-volume"><div class="chart-card"><canvas id="volumeChart"></canvas></div></div>
    <div id="tab-exercise" style="display:none">
      <div class="ex-chips" id="ex-chip-row"></div>
      <div class="chart-card"><canvas id="exChart"></canvas></div>
    </div>
    <div id="tab-history" style="display:none"><div id="history-list"></div></div>
  </div>

</div>



<div id="screen-summary">
  <div class="summary-icon">🏁</div>
  <div class="summary-title">Workout Done</div>
  <div class="summary-sub" id="summary-sub"></div>
  <div class="summary-stats" id="summary-stats"></div>
  <div class="summary-prs" id="summary-prs"></div>
  <button class="btn btn-primary" style="width:100%;max-width:340px;padding:14px" id="summary-done-btn">Back to Home</button>
</div>

<nav>
  <button id="nav-home" class="active">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button id="nav-workout">
    <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M2 7h4M18 7h4M2 17h4M18 17h4"/></svg>
    Workout
  </button>
  <button id="nav-progress">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progress
  </button>
</nav>

<script>
/* ── STATE ── */
const KEY='strain-v4';
let S={
  theme:'dark',programs:[],activeProgramId:null,currentWeek:1,
  completedWeeks:[],currentWorkout:null,history:[],bestLifts:{}
};
function load(){
  try{const r=localStorage.getItem(KEY);if(r)Object.assign(S,JSON.parse(r));}catch(e){}
  if(!S.programs.length)seed();
}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function uid(){return crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now();}
function seed(){
  const p={id:uid(),name:'My First Program',weeks:4,days:[
    {id:uid(),name:'Push',exercises:[{id:uid(),name:'Bench Press'},{id:uid(),name:'Overhead Press'},{id:uid(),name:'Lateral Raise'}]},
    {id:uid(),name:'Pull',exercises:[{id:uid(),name:'Deadlift'},{id:uid(),name:'Barbell Row'},{id:uid(),name:'Face Pull'}]},
    {id:uid(),name:'Legs',exercises:[{id:uid(),name:'Squat'},{id:uid(),name:'Romanian Deadlift'},{id:uid(),name:'Leg Press'}]}
  ]};
  S.programs.push(p);S.activeProgramId=p.id;S.currentWeek=1;
}

/* ── NAV ── */
let activeScreen='home';
const navIds={home:'nav-home',workout:'nav-workout',progress:'nav-progress'};
function switchTo(name){
  document.getElementById('screen-'+activeScreen).classList.remove('active');
  document.getElementById(navIds[activeScreen]).classList.remove('active');
  activeScreen=name;
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById(navIds[name]).classList.add('active');
  if(name==='progress')renderProgress();
  else if(name==='workout')renderWorkout();
  else if(name==='home')renderHome();
}
Object.keys(navIds).forEach(k=>document.getElementById(navIds[k]).addEventListener('click',()=>switchTo(k)));

/* ── SETTINGS ── */
const smenu=document.getElementById('settings-menu');
document.getElementById('settings-btn').addEventListener('click',e=>{e.stopPropagation();smenu.classList.toggle('open');});
document.addEventListener('click',()=>smenu.classList.remove('open'));
smenu.addEventListener('click',e=>e.stopPropagation());
document.querySelectorAll('.tdot').forEach(d=>d.addEventListener('click',()=>{applyTheme(d.dataset.theme);smenu.classList.remove('open');}));
function applyTheme(t){
  S.theme=t;document.body.dataset.theme=t;
  document.querySelectorAll('.tdot').forEach(d=>d.classList.toggle('on',d.dataset.theme===t));
  // If switching to a preset theme, clear custom accent
  if(S.customAccent){clearCustomAccent();}
  save();
}

function applyCustomAccent(hex){
  // Convert hex to rgb for alpha variants
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-bg', `rgba(${r},${g},${b},0.12)`);
  S.customAccent=hex;
  document.querySelectorAll('.tdot').forEach(d=>d.classList.remove('on'));
  document.getElementById('custom-color').value=hex;
  save();
}

function clearCustomAccent(){
  document.documentElement.style.removeProperty('--accent');
  document.documentElement.style.removeProperty('--accent-bg');
  S.customAccent=null;
}

document.getElementById('apply-color-btn').addEventListener('click',()=>{
  const hex=document.getElementById('custom-color').value;
  applyCustomAccent(hex);
  smenu.classList.remove('open');
});
document.getElementById('export-btn').addEventListener('click',()=>{
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:`strain-${Date.now()}.json`});
  a.click();URL.revokeObjectURL(a.href);
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  if(confirm('Reset ALL data?')){localStorage.removeItem(KEY);location.reload();}
});

/* ── HOME ── */
function renderHome(){renderHero();renderProgList();renderActiveDays();}

function renderHero(){
  const el=document.getElementById('home-hero');
  const prog=S.programs.find(p=>p.id===S.activeProgramId);
  if(!prog){
    el.innerHTML=`<div class="hero-card"><div class="hero-eyebrow">Strain</div><div class="hero-title">Ready to train?</div><div class="hero-sub">Create your first program below.</div></div>`;
    return;
  }
  const total=prog.weeks*prog.days.length;
  const done=S.history.filter(h=>h.programId===prog.id).length;
  const pct=total?Math.min(100,Math.round((done/total)*100)):0;
  const wLeft=prog.weeks-S.currentWeek+1;
  const vol=S.history.reduce((t,h)=>t+h.volume,0);
  el.innerHTML=`<div class="hero-card">
    <div class="hero-eyebrow">Active Program</div>
    <div class="hero-title">${esc(prog.name)}</div>
    <div class="hero-sub">Week ${S.currentWeek} of ${prog.weeks} · ${wLeft} week${wLeft!==1?'s':''} left</div>
    <div class="hero-stats">
      <div><div class="hero-stat-val">${done}</div><div class="hero-stat-lbl">Sessions</div></div>
      <div><div class="hero-stat-val">${pct}%</div><div class="hero-stat-lbl">Complete</div></div>
      <div><div class="hero-stat-val">${vol}kg</div><div class="hero-stat-lbl">Total vol</div></div>
    </div>
  </div>`;
}

function renderProgList(){
  const el=document.getElementById('prog-list');
  el.innerHTML='';
  if(!S.programs.length){
    el.innerHTML=`<div style="padding:0 16px"><div class="empty"><div class="empty-icon">📋</div>No programs yet.<br>Tap ＋ New to create one.</div></div>`;
    return;
  }
  S.programs.forEach(prog=>{
    const isActive=prog.id===S.activeProgramId;
    const done=S.history.filter(h=>h.programId===prog.id).length;
    const total=prog.weeks*prog.days.length;
    const pct=total?Math.min(100,Math.round((done/total)*100)):0;
    const card=document.createElement('div');
    card.className='prog-card fu'+(isActive?' active-prog':'');
    const pills=Array.from({length:prog.weeks},(_,i)=>i+1).map(w=>{
      const isDone=S.completedWeeks.some(cw=>cw.programId===prog.id&&cw.week===w);
      const isCur=isActive&&w===S.currentWeek;
      return `<span class="wpill${isCur?' cur':isDone?' done':''}">W${w}</span>`;
    }).join('');
    card.innerHTML=`
      <div class="prog-card-hd">
        <div>
          <div class="prog-name">${esc(prog.name)}</div>
          <div class="prog-meta">${prog.weeks} weeks · ${prog.days.length} days/week${isActive?' · <span style="color:var(--accent)">Active</span>':''}</div>
        </div>
        <button class="menu-btn">•••</button>
      </div>
      <div class="prog-bar"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div class="week-pills">${pills}</div>
    `;
    card.querySelector('.menu-btn').addEventListener('click',e=>{e.stopPropagation();openProgMenu(prog,card);});
    el.appendChild(card);
  });
}

let openDrop=null;
function openProgMenu(prog,card){
  if(openDrop){openDrop.remove();openDrop=null;}
  const isActive=prog.id===S.activeProgramId;
  const dd=document.createElement('div');dd.className='dropdown';
  if(!isActive){
    const sa=document.createElement('button');sa.textContent='✅ Set Active';
    sa.addEventListener('click',()=>{S.activeProgramId=prog.id;S.currentWeek=1;save();dd.remove();openDrop=null;renderHome();});
    dd.appendChild(sa);
  }
  const eb=document.createElement('button');eb.textContent='✏️ Edit';
  eb.addEventListener('click',()=>{dd.remove();openDrop=null;openProgEditor(prog);});
  const db=document.createElement('button');db.textContent='🗑 Delete';db.className='danger';
  db.addEventListener('click',()=>{
    dd.remove();openDrop=null;
    if(!confirm(`Delete "${prog.name}"?`))return;
    S.programs=S.programs.filter(p=>p.id!==prog.id);
    if(S.activeProgramId===prog.id){S.activeProgramId=S.programs[0]?.id||null;S.currentWeek=1;}
    save();renderHome();
  });
  dd.appendChild(eb);dd.appendChild(db);
  card.style.position='relative';card.appendChild(dd);openDrop=dd;
  setTimeout(()=>document.addEventListener('click',function h(){dd.remove();openDrop=null;document.removeEventListener('click',h);},{once:true}),0);
}

function renderActiveDays(){
  const sec=document.getElementById('active-days-section');
  const prog=S.programs.find(p=>p.id===S.activeProgramId);
  if(!prog){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('active-days-lbl').textContent=`Week ${S.currentWeek} — Days`;
  const el=document.getElementById('active-days-list');el.innerHTML='';
  prog.days.forEach(day=>{
    const done=S.history.some(h=>h.programId===prog.id&&h.week===S.currentWeek&&h.dayId===day.id);
    const card=document.createElement('div');
    card.className='day-card fu';
    if(done)card.style.opacity='.5';
    const pills=day.exercises.slice(0,4).map(e=>`<span class="ex-pill">${esc(e.name)}</span>`).join('');
    const more=day.exercises.length>4?`<span class="ex-pill">+${day.exercises.length-4}</span>`:'';
    card.innerHTML=`
      <div class="day-card-hd">
        <div>
          <div class="day-name">${esc(day.name)}${done?' <span style="color:var(--success);font-size:14px">✓</span>':''}</div>
          <div class="day-excount">${day.exercises.length} exercises</div>
        </div>
      </div>
      <div>${pills}${more}</div>
      <button class="btn btn-primary btn-full">${done?'Log Again':'Start Workout'}</button>
    `;
    card.querySelector('button').addEventListener('click',()=>startWorkout(prog,day));
    el.appendChild(card);
  });
  // Week nav
  const wNav=document.createElement('div');
  wNav.style.cssText='display:flex;gap:8px;margin-top:4px;';
  if(S.currentWeek>1){
    const p=document.createElement('button');p.className='btn btn-ghost btn-sm';p.textContent='← Prev Week';
    p.addEventListener('click',()=>{S.currentWeek--;save();renderHome();});
    wNav.appendChild(p);
  }
  if(S.currentWeek<prog.weeks){
    const n=document.createElement('button');n.className='btn btn-ghost btn-sm';n.textContent='Next Week →';
    n.addEventListener('click',()=>{
      if(!confirm(`Advance to Week ${S.currentWeek+1}?`))return;
      if(!S.completedWeeks.some(cw=>cw.programId===prog.id&&cw.week===S.currentWeek))
        S.completedWeeks.push({programId:prog.id,week:S.currentWeek});
      S.currentWeek++;save();renderHome();
    });
    wNav.appendChild(n);
  }
  el.appendChild(wNav);
}

/* ── PROGRAM EDITOR ── */
document.getElementById('new-prog-btn').addEventListener('click',()=>{
  const prog={id:uid(),name:'New Program',weeks:4,days:[]};
  S.programs.push(prog);save();openProgEditor(prog);
});

function openProgEditor(prog){
  // Clear home and render editor in prog-list slot
  document.getElementById('home-hero').innerHTML='';
  document.getElementById('prog-list').innerHTML='';
  document.getElementById('active-days-section').style.display='none';
  const wrap=document.createElement('div');wrap.className='editor-wrap';
  const card=document.createElement('div');card.className='editor-card fu';

  const nf=document.createElement('div');nf.className='field-row';
  nf.innerHTML='<div class="field-label">Program Name</div>';
  const ni=document.createElement('input');ni.className='field-input';ni.value=prog.name;
  nf.appendChild(ni);card.appendChild(nf);

  const wf=document.createElement('div');wf.className='field-row';
  wf.innerHTML='<div class="field-label">Number of Weeks</div>';
  const wi=document.createElement('input');wi.className='field-input';wi.type='number';wi.value=prog.weeks;wi.min=1;wi.max=52;
  wf.appendChild(wi);card.appendChild(wf);

  const dl=document.createElement('div');dl.className='field-label';dl.style.marginBottom='8px';dl.textContent='Training Days';
  card.appendChild(dl);

  const daysList=document.createElement('div');card.appendChild(daysList);

  function rDays(){
    daysList.innerHTML='';
    prog.days.forEach((day,di)=>{
      const dc=document.createElement('div');
      dc.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;';
      const dh=document.createElement('div');dh.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
      const dni=document.createElement('input');
      dni.style.cssText='background:none;border:none;color:var(--text);font-family:var(--font-d);font-size:16px;font-weight:700;outline:none;flex:1;-webkit-user-select:text;user-select:text;';
      dni.value=day.name;dni.addEventListener('change',()=>{day.name=dni.value.trim()||day.name;});
      const rd=document.createElement('button');rd.className='rm-btn';rd.innerHTML='−';
      rd.addEventListener('click',()=>{prog.days.splice(di,1);rDays();});
      dh.appendChild(dni);dh.appendChild(rd);dc.appendChild(dh);
      day.exercises.forEach((ex,ei)=>{
        const row=document.createElement('div');row.className='ed-ex-row';
        const arrows=document.createElement('div');arrows.className='reorder-btns';
        const upB=document.createElement('button');upB.className='reorder-btn';upB.textContent='↑';upB.disabled=ei===0;
        upB.addEventListener('click',()=>{if(ei===0)return;const t=day.exercises.splice(ei,1)[0];day.exercises.splice(ei-1,0,t);rDays();});
        const dnB=document.createElement('button');dnB.className='reorder-btn';dnB.textContent='↓';dnB.disabled=ei===day.exercises.length-1;
        dnB.addEventListener('click',()=>{if(ei===day.exercises.length-1)return;const t=day.exercises.splice(ei,1)[0];day.exercises.splice(ei+1,0,t);rDays();});
        arrows.appendChild(upB);arrows.appendChild(dnB);
        const nm=document.createElement('span');nm.textContent=ex.name;nm.style.flex='1';
        const re=document.createElement('button');re.className='rm-btn';re.innerHTML='−';
        re.addEventListener('click',()=>{day.exercises.splice(ei,1);rDays();});
        row.appendChild(arrows);row.appendChild(nm);row.appendChild(re);
        dc.appendChild(row);
      });
      const ar=document.createElement('div');ar.className='add-ex-row';
      const ain=document.createElement('input');ain.className='field-input';ain.placeholder='Add exercise…';ain.style.fontSize='14px';
      ain.addEventListener('keydown',e=>{if(e.key==='Enter')aeb.click();});
      const aeb=document.createElement('button');aeb.className='btn btn-ghost btn-sm';aeb.textContent='Add';
      aeb.addEventListener('click',()=>{const n=ain.value.trim();if(!n)return;day.exercises.push({id:uid(),name:n});ain.value='';rDays();});
      ar.appendChild(ain);ar.appendChild(aeb);dc.appendChild(ar);daysList.appendChild(dc);
    });
    const ab=document.createElement('button');ab.className='add-btn';ab.style.marginTop='4px';ab.textContent='＋ Add Training Day';
    ab.addEventListener('click',()=>{prog.days.push({id:uid(),name:'Day '+(prog.days.length+1),exercises:[]});rDays();});
    daysList.appendChild(ab);
  }
  rDays();

  const acts=document.createElement('div');acts.className='ed-actions';
  const sb=document.createElement('button');sb.className='btn btn-primary';sb.textContent='Save Program';
  sb.addEventListener('click',()=>{
    prog.name=ni.value.trim()||prog.name;
    prog.weeks=Math.max(1,parseInt(wi.value)||4);
    if(!S.activeProgramId){S.activeProgramId=prog.id;S.currentWeek=1;}
    save();renderHome();
  });
  const cb=document.createElement('button');cb.className='btn btn-ghost';cb.textContent='Cancel';
  cb.addEventListener('click',()=>{
    // Remove if new and unsaved (no history)
    if(!S.history.some(h=>h.programId===prog.id)&&prog.days.length===0)
      S.programs=S.programs.filter(p=>p.id!==prog.id);
    save();renderHome();
  });
  acts.appendChild(sb);acts.appendChild(cb);card.appendChild(acts);
  wrap.appendChild(card);
  document.getElementById('prog-list').appendChild(wrap);
}

/* ── WORKOUT ── */
function startWorkout(prog,day){
  if(!day.exercises.length){alert('Add exercises to this day first.');return;}
  S.currentWorkout={
    id:uid(),date:new Date().toISOString().slice(0,10),
    programId:prog.id,programName:prog.name,
    week:S.currentWeek,dayId:day.id,dayName:day.name,
    currentIdx:0,
    exercises:day.exercises.map(ex=>({name:ex.name,sets:[]}))
  };
  save();switchTo('workout');
}

function renderWorkout(){
  const el=document.getElementById('workout-content');el.innerHTML='';
  const qa=document.getElementById('quick-add-btn');
  const wk=S.currentWorkout;
  if(!wk){
    qa.classList.remove('visible');
    el.innerHTML=`<div style="padding:20px 16px 16px"><div class="screen-title">Workout</div></div>
      <div style="padding:0 16px"><div class="empty"><div class="empty-icon">🏋️</div>No active workout.<br>Pick a day from Home to start.</div></div>`;
    return;
  }
  qa.classList.add('visible');
  const hdr=document.createElement('div');hdr.className='wk-hd';
  hdr.innerHTML=`<div class="wk-eyebrow">${esc(wk.programName)} · Week ${wk.week} · ${wk.date}</div><div class="wk-title">${esc(wk.dayName)}</div>`;
  el.appendChild(hdr);
  const segs=document.createElement('div');segs.className='wk-segs';
  wk.exercises.forEach((_,i)=>{const s=document.createElement('div');s.className='wk-seg'+(i<wk.currentIdx?' done':i===wk.currentIdx?' active':'');segs.appendChild(s);});
  el.appendChild(segs);
  wk.exercises.forEach((ex,idx)=>{
    const isCur=idx===wk.currentIdx,isDone=idx<wk.currentIdx;
    const card=document.createElement('div');
    card.className='ex-card'+(isCur?' current':isDone?' done-ex':'');
    if(isCur)card.id='cur-ex';
    const badge=isCur?'<span class="badge badge-on">Active</span>':isDone?'<span class="badge badge-done">✓ Done</span>':'';
    const hd=document.createElement('div');hd.className='ex-card-hd';
    hd.innerHTML=`<span class="ex-card-name">${esc(ex.name)}</span>${badge}`;
    card.appendChild(hd);
    if(ex.sets.length){
      const sl=document.createElement('div');sl.className='set-list';
      ex.sets.forEach((s,i)=>{const r=document.createElement('div');r.className='set-row';r.innerHTML=`<span>Set ${i+1}</span><span class="set-val">${s.weight} kg × ${s.reps}</span>`;sl.appendChild(r);});
      card.appendChild(sl);
    }
    if(isCur)card.appendChild(buildInput(wk,ex,idx));
    el.appendChild(card);
  });
  setTimeout(()=>{const c=document.getElementById('cur-ex');if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function buildInput(wk,ex,idx){
  const area=document.createElement('div');area.className='ex-input';
  const prev=findPrev(ex.name);const ns=ex.sets.length+1;
  let dw='',dr='';
  if(prev&&prev.sets[ns-1]){dw=prev.sets[ns-1].weight;dr=prev.sets[ns-1].reps;}
  if(prev){const h=document.createElement('div');h.className='hint';h.textContent=`Last session — Set ${ns}: ${dw||'?'}kg × ${dr||'?'}`;area.appendChild(h);}
  const ir=document.createElement('div');ir.className='input-row';
  const wi=document.createElement('input');wi.type='number';wi.placeholder='Weight (kg)';wi.value=dw;wi.inputMode='decimal';
  const ri=document.createElement('input');ri.type='number';ri.placeholder='Reps';ri.value=dr;ri.inputMode='numeric';
  ir.appendChild(wi);ir.appendChild(ri);area.appendChild(ir);
  const acts=document.createElement('div');acts.className='act-row';
  const lb=document.createElement('button');lb.className='btn btn-primary btn-sm';lb.textContent=`Log Set ${ns}`;
  lb.addEventListener('click',()=>{
    const w=parseFloat(wi.value),r=parseInt(ri.value,10);
    if(!w||w<=0||!r||r<=0){alert('Enter valid weight and reps.');return;}
    ex.sets.push({weight:w,reps:r});updateBest(ex.name,w,r);save();renderWorkout();
  });
  const ub=document.createElement('button');ub.className='btn btn-ghost btn-sm';ub.textContent='Undo';
  ub.addEventListener('click',()=>{if(!ex.sets.length)return;ex.sets.pop();save();renderWorkout();});
  const isLast=idx===wk.exercises.length-1;
  const nb=document.createElement('button');nb.className='btn btn-ghost btn-sm';nb.textContent=isLast?'🏁 Finish':'Next →';
  nb.addEventListener('click',()=>{if(!isLast){wk.currentIdx++;save();renderWorkout();}else finishWorkout();});
  // Back button (not on first exercise)
  if(idx>0){
    const bb=document.createElement('button');bb.className='btn btn-ghost btn-sm';bb.textContent='← Back';
    bb.addEventListener('click',()=>{wk.currentIdx--;save();renderWorkout();});
    acts.appendChild(bb);
  }
  acts.appendChild(lb);acts.appendChild(ub);acts.appendChild(nb);area.appendChild(acts);
  return area;
}

function findPrev(name){for(const h of S.history){const e=h.exercises.find(e=>e.name===name);if(e)return e;}return null;}
function updateBest(name,w,r){const c=S.bestLifts[name];if(!c||w>c.weight||(w===c.weight&&r>c.reps))S.bestLifts[name]={weight:w,reps:r};}

function finishWorkout(){
  const wk=S.currentWorkout;if(!wk)return;
  const vol=wk.exercises.reduce((t,ex)=>t+ex.sets.reduce((s,set)=>s+set.weight*set.reps,0),0);

  // Detect new PRs
  const prs=[];
  wk.exercises.forEach(ex=>{
    if(!ex.sets.length)return;
    const maxW=Math.max(...ex.sets.map(s=>s.weight));
    const maxR=ex.sets.filter(s=>s.weight===maxW).reduce((best,s)=>s.reps>best?s.reps:best,0);
    const prev=S.bestLifts[ex.name];
    if(!prev||maxW>prev.weight||(maxW===prev.weight&&maxR>prev.reps)){
      if(prev)prs.push({name:ex.name,weight:maxW,reps:maxR});
    }
    updateBest(ex.name,maxW,maxR);
  });

  S.history.unshift({id:wk.id,date:wk.date,programId:wk.programId,programName:wk.programName,week:wk.week,dayId:wk.dayId,dayName:wk.dayName,volume:vol,exercises:wk.exercises.map(ex=>({name:ex.name,sets:[...ex.sets]}))});
  S.currentWorkout=null;save();
  document.getElementById('quick-add-btn').classList.remove('visible');

  // Show summary
  const totalSets=wk.exercises.reduce((t,ex)=>t+ex.sets.length,0);
  document.getElementById('summary-sub').textContent=`${wk.dayName} · ${wk.date}`;
  document.getElementById('summary-stats').innerHTML=`
    <div class="summary-stat"><div class="summary-stat-val">${vol}</div><div class="summary-stat-lbl">kg Volume</div></div>
    <div class="summary-stat"><div class="summary-stat-val">${wk.exercises.length}</div><div class="summary-stat-lbl">Exercises</div></div>
    <div class="summary-stat"><div class="summary-stat-val">${totalSets}</div><div class="summary-stat-lbl">Total Sets</div></div>
    <div class="summary-stat"><div class="summary-stat-val">${prs.length}</div><div class="summary-stat-lbl">New PRs</div></div>
  `;
  const prsEl=document.getElementById('summary-prs');
  prsEl.innerHTML=prs.length?prs.map(pr=>`<div class="summary-pr"><span class="summary-pr-icon">🏆</span><span class="summary-pr-text">New PR — <span class="summary-pr-name">${esc(pr.name)}</span>: ${pr.weight}kg × ${pr.reps}</span></div>`).join(''):'';
  document.getElementById('screen-summary').classList.add('visible');
}

document.getElementById('quick-add-btn').addEventListener('click',()=>{
  const wk=S.currentWorkout;if(!wk)return;
  const name=prompt('Exercise name:');if(!name)return;
  wk.exercises.push({name:name.trim(),sets:[]});save();renderWorkout();
});



document.getElementById('summary-done-btn').addEventListener('click',()=>{
  document.getElementById('screen-summary').classList.remove('visible');
  switchTo('home');
});


let volChart=null,exChart=null,activeTab='volume',activeEx=null;
document.querySelectorAll('.prog-tab').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.prog-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeTab=btn.dataset.tab;
  document.getElementById('tab-volume').style.display=activeTab==='volume'?'block':'none';
  document.getElementById('tab-exercise').style.display=activeTab==='exercise'?'block':'none';
  document.getElementById('tab-history').style.display=activeTab==='history'?'block':'none';
  if(activeTab==='exercise')renderExTab();
  else if(activeTab==='history')renderHistTab();
  else renderVolChart();
}));

function renderProgress(){
  const tot=S.history.reduce((t,h)=>t+h.volume,0);
  document.getElementById('progress-sub').textContent=S.history.length?`${S.history.length} sessions · ${tot}kg total`:'No sessions yet';
  renderVolChart();
  if(activeTab==='exercise')renderExTab();
  else if(activeTab==='history')renderHistTab();
}

function renderVolChart(){
  const canvas=document.getElementById('volumeChart');
  const sorted=[...S.history].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(volChart){volChart.destroy();volChart=null;}
  if(!sorted.length){
    canvas.parentElement.innerHTML='<div class="chart-empty">Complete a workout to see your volume trend.</div>';return;
  }
  const accent=getComputedStyle(document.body).getPropertyValue('--accent').trim();
  volChart=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{labels:sorted.map(w=>w.date),datasets:[{data:sorted.map(w=>w.volume),borderColor:accent,backgroundColor:accent+'22',fill:true,tension:.35,pointRadius:4,pointBackgroundColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{beginAtZero:true,ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}}},animation:{duration:500}}
  });
}

function renderExTab(){
  const row=document.getElementById('ex-chip-row');row.innerHTML='';
  const names=[...new Set(S.history.flatMap(h=>h.exercises.map(e=>e.name)))];
  if(!names.length){row.innerHTML='<div style="padding:0 4px;color:var(--muted);font-size:13px;">No data yet.</div>';return;}
  if(!activeEx||!names.includes(activeEx))activeEx=names[0];
  names.forEach(n=>{
    const c=document.createElement('button');c.className='ex-chip'+(n===activeEx?' active':'');c.textContent=n;
    c.addEventListener('click',()=>{activeEx=n;renderExTab();});
    row.appendChild(c);
  });
  renderExChart();
}

function renderExChart(){
  const canvas=document.getElementById('exChart');
  if(exChart){exChart.destroy();exChart=null;}
  const pts=[];
  [...S.history].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(h=>{
    const ex=h.exercises.find(e=>e.name===activeEx);
    if(!ex||!ex.sets.length)return;
    const maxW=Math.max(...ex.sets.map(s=>s.weight));
    const vol=ex.sets.reduce((t,s)=>t+s.weight*s.reps,0);
    pts.push({date:h.date,weight:maxW,vol});
  });
  if(!pts.length){canvas.parentElement.innerHTML='<div class="chart-empty">No data for this exercise yet.</div>';return;}
  const accent=getComputedStyle(document.body).getPropertyValue('--accent').trim();
  exChart=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{
      labels:pts.map(p=>p.date),
      datasets:[
        {label:'Max Weight (kg)',data:pts.map(p=>p.weight),borderColor:accent,backgroundColor:accent+'22',fill:true,tension:.35,pointRadius:4,pointBackgroundColor:'#fff',yAxisID:'y'},
        {label:'Volume (kg)',data:pts.map(p=>p.vol),borderColor:'rgba(52,199,123,0.8)',backgroundColor:'rgba(52,199,123,0.08)',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#fff',yAxisID:'y1',borderDash:[4,3]}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{color:'#888',font:{size:10},boxWidth:20,padding:10}}},
      scales:{
        x:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{beginAtZero:false,ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'},position:'left'},
        y1:{beginAtZero:true,ticks:{color:'rgba(52,199,123,0.6)',font:{size:10}},grid:{display:false},position:'right'}
      },
      animation:{duration:400}
    }
  });
}

function renderHistTab(){
  const el=document.getElementById('history-list');el.innerHTML='';
  if(!S.history.length){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div>No history yet.</div>';return;}
  S.history.forEach((h,hi)=>{
    const c=document.createElement('div');c.className='hist-card fu';
    c.innerHTML=`
      <div class="hist-top">
        <div>
          <div class="hist-name">${esc(h.dayName)}</div>
          <div class="hist-date">${h.date}${h.week?' · Week '+h.week:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="text-align:right"><div class="hist-vol">${h.volume}<span> kg</span></div></div>
          <button class="hist-del" title="Delete session">🗑</button>
        </div>
      </div>
      <div class="hist-exes">${h.exercises.map(e=>esc(e.name)).join(' · ')}</div>
    `;
    c.querySelector('.hist-del').addEventListener('click',()=>{
      if(!confirm('Delete this session from history?'))return;
      S.history.splice(hi,1);save();renderHistTab();
    });
    el.appendChild(c);
  });
}

/* ── UTILS ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── INIT ── */
load();applyTheme(S.theme||'dark');
if(S.customAccent)applyCustomAccent(S.customAccent);
renderHome();
</script>
</body>
</html>
